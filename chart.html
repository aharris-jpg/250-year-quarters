<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--rg-accent:#2B7DE0;--rg-dark:#14213D;--rg-border:#24314E;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:#23262e;background:#fff;}
  .wrap{max-width:720px;margin:0 auto;border:1px solid var(--rg-border);border-radius:12px;overflow:hidden;}
  .head{position:relative;background:var(--rg-dark);color:#fff;padding:18px 20px 16px;}
  .strip{position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,var(--rg-dark),var(--rg-accent),#a9cdf5,var(--rg-accent),var(--rg-dark));
    background-size:200% 100%;animation:sh 4s linear infinite;}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .head h2{margin:0;font-family:"Source Serif 4",Georgia,serif;font-size:20px;font-weight:700;}
  .head p{margin:4px 0 0;font-size:13px;color:#b9c0cc;}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;padding:14px 20px 12px;align-items:center;}
  .tabs .lab{font-size:12px;color:#6b6f78;margin-right:2px;}
  .tab{border:1px solid var(--rg-border);background:#eef2f7;color:#3a3d45;border-radius:999px;
    padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;}
  .tab.on{background:var(--rg-accent);border-color:var(--rg-accent);color:#ffffff;}
  .tblwrap{overflow-x:auto;padding:0 8px;}
  table{border-collapse:collapse;width:100%;min-width:640px;font-size:13px;}
  thead th{background:var(--rg-dark);color:#fff;font-weight:600;text-align:right;padding:10px 12px;
    white-space:nowrap;position:sticky;top:0;}
  thead th.l{text-align:left;}
  thead th.act{background:#233250;color:var(--rg-accent);}
  tbody td{padding:9px 12px;border-bottom:1px solid #e6e9ee;text-align:right;white-space:nowrap;}
  tbody td.l{text-align:left;}
  tbody td.nm{font-weight:700;color:var(--rg-dark);}
  tbody tr:nth-child(even){background:#f5f8fb;}
  td.act{position:relative;font-weight:700;color:var(--rg-dark);}
  td.act .fill{position:absolute;left:0;top:3px;bottom:3px;background:rgba(43,125,224,.22);
    border-right:2px solid var(--rg-accent);border-radius:3px;z-index:0;}
  td.act span{position:relative;z-index:1;}
  .rk{color:#6b6f78;}
  .pager{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 16px;}
  .pbtn{border:1px solid var(--rg-border);background:#fff;color:var(--rg-dark);border-radius:8px;
    padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;}
  .pbtn:disabled{opacity:.4;cursor:default;}
  .plabel{font-size:13px;color:#6b6f78;font-weight:600;}
  .foot{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:12px 20px 16px;border-top:1px solid #e6e9ee;}
  .foot .src{font-size:11px;color:#6b6f78;max-width:70%;}
  .logo{font-family:"Source Serif 4",Georgia,serif;font-weight:700;font-size:15px;color:var(--rg-dark);}
  .logo span{color:var(--rg-accent);}
  @media(max-width:640px){.head h2{font-size:17px;}}
</style>
<div class="wrap">

    <button class="pbtn" id="next">Next 10</button>
  </div>
  <div class="foot">
    <div class="src">Source: U.S. Mint, U.S. Census Bureau (2024), FDIC (2023). Modeled estimates. July 2026.</div>
    <div class="logo">Roto<span>Grinders</span></div>
  </div>
</div>

  var fmt=function(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,",");};
  function sorted(m){
    var a=DATA.slice();
    if(m==="est"){a.sort(function(x,y){return y.est-x.est||y.probPct-x.probPct;});}
    else{a.sort(function(x,y){return y.probPct-x.probPct||y.est-x.est;});}
    return a;
  }
  function render(){
    var a=sorted(metric);
    var vals=a.map(function(d){return metric==="est"?d.est:d.probPct;});
    var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
    var start=page*PER, slice=a.slice(start,start+PER);
    // header active state
    document.querySelectorAll("thead th").forEach(function(th){
      th.classList.toggle("act", th.dataset.c===metric);
    });
    var rows="";
    slice.forEach(function(d,i){
      var v=metric==="est"?d.est:d.probPct;
      var w=8+(92*((v-mn)/(mx-mn||1)));
      function cell(c,val){
        if(c===metric) return '<td class="act"><div class="fill" style="width:'+w.toFixed(1)+'%"></div><span>'+val+'</span></td>';
        return '<td>'+val+'</td>';
      }

        +cell("odds",d.odds)
        +cell("est",fmt(d.est))
        +'<td>'+d.cash.toFixed(3)+'</td>'
        +'<td>'+fmt(d.pop)+'</td>'

    });
    document.getElementById("body").innerHTML=rows;
    document.getElementById("plabel").textContent="Ranks "+(start+1)+" to "+(start+slice.length)+" of "+a.length;
    document.getElementById("prev").disabled=page===0;
    document.getElementById("next").disabled=start+PER>=a.length;
  }
  document.querySelectorAll(".tab").forEach(function(t){

    });
  });
  document.getElementById("prev").onclick=function(){if(page>0){page--;render();}};
  document.getElementById("next").onclick=function(){page++;render();};
  render();
