<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  :root{--rg-accent:#2B7DE0;--rg-dark:#14213D;--rg-border:#24314E;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:#23262e;background:#fff;}
  .wrap{max-width:720px;margin:0 auto;border:1px solid var(--rg-border);border-radius:12px;overflow:hidden;}
  .head{position:relative;background:var(--rg-dark);color:#fff;padding:18px 20px 16px;}
  .strip{position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,var(--rg-dark),var(--rg-accent),#a9cdf5,var(--rg-accent),var(--rg-dark));
    background-size:200% 100%;animation:sh 4s linear infinite;}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .head h2{margin:0;font-family:"Source Serif 4",Georgia,serif;font-size:20px;font-weight:700;}
  .head p{margin:4px 0 0;font-size:13px;color:#b9c0cc;}
  .map{padding:10px 12px 0;}
  svg{display:block;width:100%;height:auto;}
  .state{stroke:#fff;stroke-width:2.5px;}
  .legend{padding:4px 22px 2px;}
  .lgbar{height:12px;border-radius:6px;
    background:linear-gradient(90deg,#eef4fc,#c3dbf6,#7db2ec,#2B7DE0,#1a5bb0,#14213D);}
  .lgticks{display:flex;justify-content:space-between;font-size:11px;color:#6b6f78;margin-top:4px;}
  .lglab{font-size:11px;color:#6b6f78;margin:2px 0 0;}
  .foot{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:12px 20px 16px;border-top:1px solid #e6e9ee;margin-top:8px;}
  .foot .src{font-size:11px;color:#6b6f78;max-width:70%;}
  .logo{font-family:"Source Serif 4",Georgia,serif;font-weight:700;font-size:15px;color:var(--rg-dark);}
  .logo span{color:var(--rg-accent);}
  @media(max-width:640px){.head h2{font-size:16px;}}
</style>
<div class="wrap">
  <div class="head"><div class="strip"></div>
    <h2>How Likely You Are to Find the 250th Anniversary Quarter</h2>
    <p>Darker states have the higher odds. Adjusted for local cash use.</p>
  </div>
  <div class="map"><svg id="map" viewBox="0 0 720 440" preserveAspectRatio="xMidYMid meet"></svg></div>
  <div class="legend">
    <div class="lgbar"></div>
    <div class="lgticks"><span>0</span><span>25</span><span>50</span><span>75</span><span>100</span></div>
    <div class="lglab">State ranking, lowest to highest odds</div>
  </div>
  <div class="foot">
    <div class="src">Source: U.S. Mint, U.S. Census Bureau (2024), FDIC (2023). Modeled estimates. July 2026.</div>
    <div class="logo">Roto<span>Grinders</span></div>
  </div>
</div>
